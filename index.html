<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestionnaire de tâches</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #080b14;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 24px 60px;
      overflow-x: hidden;
    }

    /* Ambient background blobs */
    body::before,
    body::after {
      content: '';
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      pointer-events: none;
      z-index: 0;
    }
    body::before {
      width: 600px;
      height: 600px;
      background: #6366f1;
      top: -150px;
      left: -100px;
    }
    body::after {
      width: 500px;
      height: 500px;
      background: #06b6d4;
      bottom: -100px;
      right: -80px;
    }

    /* Header */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #e2e8f0 0%, #a5b4fc 50%, #67e8f9 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 8px;
      font-size: 0.875rem;
      color: #475569;
      font-weight: 400;
    }

    /* Board */
    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      max-width: 1140px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* Column */
    .column {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 16px;
      padding: 18px;
      min-height: 540px;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: border-color 0.2s;
    }

    .column:hover {
      border-color: rgba(255, 255, 255, 0.11);
    }

    .column-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .column-label {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .col-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .col-todo    .col-dot { background: #94a3b8; box-shadow: 0 0 8px #94a3b840; }
    .col-inprogress .col-dot { background: #818cf8; box-shadow: 0 0 8px #818cf840; }
    .col-done    .col-dot { background: #34d399; box-shadow: 0 0 8px #34d39940; }

    .column-title {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .col-todo    .column-title { color: #94a3b8; }
    .col-inprogress .column-title { color: #818cf8; }
    .col-done    .column-title { color: #34d399; }

    .count-badge {
      font-size: 0.72rem;
      font-weight: 600;
      background: rgba(255,255,255,0.06);
      color: #64748b;
      border-radius: 999px;
      padding: 2px 9px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    /* Task list */
    .task-list {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 40px;
      transition: background 0.15s;
      border-radius: 10px;
      padding: 2px;
    }

    .task-list.drag-over {
      background: rgba(99, 102, 241, 0.07);
      outline: 2px dashed rgba(99, 102, 241, 0.3);
      outline-offset: -2px;
    }

    /* Task card */
    .task {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 10px;
      padding: 13px 14px;
      cursor: grab;
      user-select: none;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s, background 0.15s;
      position: relative;
      animation: taskIn 0.2s ease;
    }

    @keyframes taskIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .task:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: rgba(255, 255, 255, 0.13);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    }

    .task.dragging {
      opacity: 0.35;
      cursor: grabbing;
      transform: rotate(1.5deg) scale(0.98);
    }

    .task-text {
      font-size: 0.875rem;
      line-height: 1.55;
      word-break: break-word;
      color: #cbd5e1;
    }

    .task-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 10px;
    }

    .task-date {
      font-size: 0.7rem;
      color: #475569;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .task-date::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #334155;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #334155;
      cursor: pointer;
      font-size: 0.8rem;
      padding: 3px 5px;
      border-radius: 5px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s, background 0.15s;
    }

    .task:hover .delete-btn { opacity: 1; }

    .delete-btn:hover {
      color: #f87171;
      background: rgba(248, 113, 113, 0.12);
    }

    /* Add task form */
    .add-task-form {
      margin-top: 10px;
    }

    .add-task-form textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 0.875rem;
      font-family: inherit;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .add-task-form textarea:focus {
      border-color: rgba(99, 102, 241, 0.6);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .add-task-form textarea::placeholder {
      color: #334155;
    }

    .form-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-add {
      background: linear-gradient(135deg, #6366f1, #818cf8);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 7px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, box-shadow 0.15s;
      box-shadow: 0 2px 10px rgba(99,102,241,0.3);
    }

    .btn-add:hover {
      opacity: 0.88;
      box-shadow: 0 4px 16px rgba(99,102,241,0.45);
    }

    .btn-cancel {
      background: rgba(255,255,255,0.05);
      color: #64748b;
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 7px;
      padding: 7px 13px;
      font-size: 0.82rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-cancel:hover {
      background: rgba(255,255,255,0.09);
      color: #94a3b8;
    }

    /* New task button */
    .btn-new-task {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      background: none;
      border: 1px dashed rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #334155;
      font-size: 0.83rem;
      font-family: inherit;
      font-weight: 500;
      padding: 10px 12px;
      width: 100%;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
      margin-top: 6px;
    }

    .btn-new-task:hover {
      border-color: rgba(99, 102, 241, 0.5);
      color: #818cf8;
      background: rgba(99, 102, 241, 0.05);
    }

    .btn-new-task .plus-icon {
      font-size: 1.1rem;
      line-height: 1;
      font-weight: 300;
    }

    /* Responsive */
    @media (max-width: 780px) {
      .board { grid-template-columns: 1fr; }
      header h1 { font-size: 1.6rem; }
    }

    @media (max-width: 480px) {
      body { padding: 24px 14px 40px; }
    }
  </style>
</head>
<body>

<header>
  <h1>Gestionnaire de tâches</h1>
  <p>Glissez vos cartes entre les colonnes pour les déplacer</p>
</header>

<div class="board">

  <!-- À faire -->
  <div class="column col-todo" id="col-todo">
    <div class="column-header">
      <div class="column-label">
        <span class="col-dot"></span>
        <span class="column-title">À faire</span>
      </div>
      <span class="count-badge" id="count-todo">0</span>
    </div>
    <div class="task-list" id="list-todo"></div>
    <div class="add-task-form" id="form-todo" style="display:none">
      <textarea rows="3" placeholder="Titre de la tâche…" id="input-todo"></textarea>
      <div class="form-actions">
        <button class="btn-add" onclick="addTask('todo')">Ajouter</button>
        <button class="btn-cancel" onclick="hideForm('todo')">Annuler</button>
      </div>
    </div>
    <button class="btn-new-task" onclick="showForm('todo')">
      <span class="plus-icon">＋</span> Nouvelle tâche
    </button>
  </div>

  <!-- En cours -->
  <div class="column col-inprogress" id="col-inprogress">
    <div class="column-header">
      <div class="column-label">
        <span class="col-dot"></span>
        <span class="column-title">En cours</span>
      </div>
      <span class="count-badge" id="count-inprogress">0</span>
    </div>
    <div class="task-list" id="list-inprogress"></div>
    <div class="add-task-form" id="form-inprogress" style="display:none">
      <textarea rows="3" placeholder="Titre de la tâche…" id="input-inprogress"></textarea>
      <div class="form-actions">
        <button class="btn-add" onclick="addTask('inprogress')">Ajouter</button>
        <button class="btn-cancel" onclick="hideForm('inprogress')">Annuler</button>
      </div>
    </div>
    <button class="btn-new-task" onclick="showForm('inprogress')">
      <span class="plus-icon">＋</span> Nouvelle tâche
    </button>
  </div>

  <!-- Terminé -->
  <div class="column col-done" id="col-done">
    <div class="column-header">
      <div class="column-label">
        <span class="col-dot"></span>
        <span class="column-title">Terminé</span>
      </div>
      <span class="count-badge" id="count-done">0</span>
    </div>
    <div class="task-list" id="list-done"></div>
    <div class="add-task-form" id="form-done" style="display:none">
      <textarea rows="3" placeholder="Titre de la tâche…" id="input-done"></textarea>
      <div class="form-actions">
        <button class="btn-add" onclick="addTask('done')">Ajouter</button>
        <button class="btn-cancel" onclick="hideForm('done')">Annuler</button>
      </div>
    </div>
    <button class="btn-new-task" onclick="showForm('done')">
      <span class="plus-icon">＋</span> Nouvelle tâche
    </button>
  </div>

</div>

<script>
  const COLS = ['todo', 'inprogress', 'done'];
  let tasks = JSON.parse(localStorage.getItem('kanban-tasks') || '{}');
  COLS.forEach(c => { if (!tasks[c]) tasks[c] = []; });

  let draggingId = null;
  let draggingCol = null;

  function save() {
    localStorage.setItem('kanban-tasks', JSON.stringify(tasks));
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short' });
  }

  function render() {
    COLS.forEach(col => {
      const list = document.getElementById('list-' + col);
      const badge = document.getElementById('count-' + col);
      list.innerHTML = '';
      badge.textContent = tasks[col].length;

      tasks[col].forEach(task => {
        const el = document.createElement('div');
        el.className = 'task';
        el.draggable = true;
        el.dataset.id = task.id;
        el.dataset.col = col;
        el.innerHTML = `
          <div class="task-text">${escapeHtml(task.text)}</div>
          <div class="task-meta">
            <span class="task-date">${formatDate(task.created)}</span>
            <button class="delete-btn" title="Supprimer" onclick="deleteTask('${col}', '${task.id}')">✕</button>
          </div>`;

        el.addEventListener('dragstart', e => {
          draggingId = task.id;
          draggingCol = col;
          el.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        el.addEventListener('dragend', () => el.classList.remove('dragging'));

        list.appendChild(el);
      });

      list.addEventListener('dragover', e => {
        e.preventDefault();
        list.classList.add('drag-over');
      });
      list.addEventListener('dragleave', () => list.classList.remove('drag-over'));
      list.addEventListener('drop', e => {
        e.preventDefault();
        list.classList.remove('drag-over');
        if (!draggingId || col === draggingCol) return;
        const taskIdx = tasks[draggingCol].findIndex(t => t.id === draggingId);
        if (taskIdx === -1) return;
        const [moved] = tasks[draggingCol].splice(taskIdx, 1);
        tasks[col].push(moved);
        draggingId = null;
        draggingCol = null;
        save();
        render();
      });
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showForm(col) {
    document.getElementById('form-' + col).style.display = 'block';
    document.getElementById('input-' + col).focus();
  }

  function hideForm(col) {
    document.getElementById('form-' + col).style.display = 'none';
    document.getElementById('input-' + col).value = '';
  }

  function addTask(col) {
    const input = document.getElementById('input-' + col);
    const text = input.value.trim();
    if (!text) return;
    tasks[col].push({ id: Date.now().toString(), text, created: Date.now() });
    save();
    hideForm(col);
    render();
  }

  function deleteTask(col, id) {
    tasks[col] = tasks[col].filter(t => t.id !== id);
    save();
    render();
  }

  COLS.forEach(col => {
    document.getElementById('input-' + col).addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addTask(col); }
      if (e.key === 'Escape') hideForm(col);
    });
  });

  render();
</script>
</body>
</html>
